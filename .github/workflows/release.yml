name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libbrotli-dev libzstd-dev zip

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build Workspace
        run: cargo build --release

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build Debian Packages
        run: |
          cargo deb -p jadm-daemon
          cargo deb -p jadm-tui

      - name: Package Extensions
        run: |
          zip -r jadm-chrome-extension.zip extension/chrome
          zip -r jadm-firefox-extension.zip extension/firefox

      - name: Prepare Release Artifacts
        run: |
          mkdir -p release-artifacts
          # Copy binaries
          cp target/release/jadm-daemon release-artifacts/jadm-daemon
          cp target/release/jadm-tui release-artifacts/jadm-tui
          # Copy debian packages
          cp target/debian/*.deb release-artifacts/
          # Copy extension zips
          cp jadm-chrome-extension.zip release-artifacts/
          cp jadm-firefox-extension.zip release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
